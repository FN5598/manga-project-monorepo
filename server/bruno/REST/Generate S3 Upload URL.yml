info:
  name: Generate S3 Upload URL
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/api/uploads/sign-url"
  body:
    type: json
    data: |-
      {
        "fileName": "asdasdasda.png",
        "contentType": "image/png",
        "mangaId": "mangaID123",
        "mangaChapter": 1,
        "size": 10000,
        "type": "PREVIEW",
        "chapters": [{
          "fileName": "01-OnePiece.png",
          "contentType": "image/png",
          "size": 1100,
          "type": "PAGE" 
        }]
      }
