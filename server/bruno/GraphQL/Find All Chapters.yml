info:
  name: Find All Chapters
  type: graphql
  seq: 8

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |
      query MyQuery($sort: SortInputType, $paginationInput: PaginationInput) {
        findAllChapters(sort: $sort, paginationInput: $paginationInput) {
          _id
          mangaId
          title
          chapterNumber
          updatedAt
        }
      }
    variables: |-
      {
        "sort": {
          "sortBy": "asc"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
