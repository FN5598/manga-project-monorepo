info:
  name: Get Manga By Id
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query MyQuery($mangaId: String!) {
        findMangaById(mangaId: $mangaId) {
          _id
          title
          author
          description
          genres {
            _id
            name
            slug
            description
          }
          status
          previewUrl
        }
      }
    variables: |-
      {
        "mangaId": "{{?mangaId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
