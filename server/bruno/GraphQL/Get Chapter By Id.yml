info:
  name: Get Chapter By Id
  type: graphql
  seq: 6

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query MyQuery($chapterId: String!) {
        findChapterById(chapterId: $chapterId) {
        	_id
          chapterNumber
          mangaId
          title
          storagePrefix
          pageCount
          updatedAt
          createdAt
        }
      }
    variables: |-
      {
        "chapterId": "{{?chapterId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
