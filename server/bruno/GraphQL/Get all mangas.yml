info:
  name: Get all mangas
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query MyQuery {
      	findAllMangas {
          _id
          title
          description
          author
          status
          previewUrl
          genres {
            _id
            description
            slug
            name
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
