info:
  name: Get all mangas
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query MyQuery($paginationInput: PaginationInput, $sort: SortInputType) {
      	findAllMangas(paginationInput: $paginationInput, sort: $sort) {
          _id
          title
          description
          author
          status
          previewUrl
          chaptersCount
          genres {
            slug
            name
          }
          createdAt
          updatedAt
          status
        }
      }
    variables: |-
      {
        "paginationInput": {
          "limit": 0,
          "page": 1
        },
        "sort": {
          "sortBy": "asc"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
