info:
  name: Get Pages For Manga Chapter
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query MyQuery(
        $chapterId: String!, 
        $paginationInput: PaginationInput, 
        $sort: SortInputType) {
        getPagesByChapterId(
          chapterId: $chapterId, 
          paginationInput: $paginationInput, 
          sort: $sort) {
            _id
            chapter
            imageKey
            fileSize
            createdAt
            pageUrl
            updatedAt
          }
      }
    variables: |-
      {
        "chapterId": "{{?chapterId}}",
        "sort": {
          "sortBy": "asc"
        },
        "paginationInput": {
          "limit": 1,
          "page": 1
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
