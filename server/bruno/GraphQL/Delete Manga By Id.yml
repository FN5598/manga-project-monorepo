info:
  name: Delete Manga By Id
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      mutation MyMutation($mangaId: String!) {
        deleteManga(mangaId: $mangaId) {
          title
          _id
        }
      }
    variables: |-
      {
        "mangaId": "{{?mangaId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
