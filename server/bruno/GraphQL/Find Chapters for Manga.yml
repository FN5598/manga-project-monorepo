info:
  name: Find Chapters for Manga
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query MyQuery($mangaId: String!) {
        findChaptersByMangaId(mangaId: $mangaId) {
          _id
          mangaId
          chapterNumber
          title
          storagePrefix
          pageCount
          uploadStatus
          createdAt
          updatedAt
        }
      }
    variables: |-
      {
        "mangaId": "{{?mangaId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
